name: CI/CD Pipeline
on:
  push:
    branches: [main]
jobs:
  # ─── Stage 1: Build & Push All Services ───
  build-and-push:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service:
          - ai-service
          - email-service
          - ticket-service
          - user-service
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
      - name: Login to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_TOKEN }}
      - name: Build & Push ${{ matrix.service }}
        run: |
          docker build \
            -t ${{ secrets.DOCKER_USERNAME }}/${{ matrix.service }}:latest \
            -t ${{ secrets.DOCKER_USERNAME }}/${{ matrix.service }}:${{ github.sha }} \
            ./services/${{ matrix.service }}
          docker push ${{ secrets.DOCKER_USERNAME }}/${{ matrix.service }}:latest
          docker push ${{ secrets.DOCKER_USERNAME }}/${{ matrix.service }}:${{ github.sha }}
  # ─── Stage 2: Deploy to EC2 ───────────────
  deploy:
    needs: build-and-push   # runs only if all builds pass
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to EC2
        uses: appleboy/ssh-action@v0.1.5
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ec2-user
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            cd /home/ubuntu/help-desk-support
            docker compose pull
            docker compose up -d
            echo "All services deployed successfully!"  


